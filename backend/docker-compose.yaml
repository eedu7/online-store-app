services:
  database:
    image: postgres:18.3-alpine3.23
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - database-data:/var/lib/postgresql/data

  redis:
    image: redis:8.6.1-alpine
    env_file: .env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: .env
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - database
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    env_file: .env
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"

volumes:
  database-data:
  redis-data:
  pgadmin-data:
